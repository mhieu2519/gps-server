version: '3.8'

services:
  # 1. Database PostGIS
  map_db:
    image: postgis/postgis:15-3.3
    container_name: map_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # 2. GeoServer (Dữ liệu bản đồ)
  map_server:
    image: oscarfonts/geoserver:latest
    container_name: map_server
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./geoserver_data:/opt/geoserver/data_dir
    environment:
      - GEOSERVER_CSRF_WHITELIST=geo.gps-map.online
      - GEOSERVER_CSRF_DISABLED=true
    depends_on:
      - map_db

  # 3. Web Next.js (Giao diện)
  gps-web:
    build: ./gps-map
    container_name: gps-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@map_db:5432/${POSTGRES_DB}
    depends_on:
      - map_db
      - emqx
      - redis_cache

  # 4. Cloudflare Tunnel (Cửa ra Internet)
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    hostname: gps-server-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}

    depends_on:
      - gps-web
      - map_server
      - socket-service
  # 5. EMQX Broker (Nhận dữ liệu từ tàu)
  emqx:
    image: emqx/emqx:latest
    container_name: emqx_broker
    restart: always
    ports:
      - "1883:1883" # MQTT Port
      - "8083:8083" # WebSocket Port
      - "18083:18083" # Dashboard Port (admin/public)
    volumes:
      - ./emqx_data:/opt/emqx/data
      - ./emqx_log:/opt/emqx/log

  # 6. Redis (Bộ nhớ đệm cho tọa độ thời gian thực)
  redis_cache:
    image: redis:alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
  socket-service:
    build: ./socket-server
    container_name: socket-service
    restart: always
    ports:
      - "4000:4000"
    environment:
      - REDIS_URL=redis://redis_cache:6379
      - MQTT_HOST=emqx
      - MQTT_PORT=1883
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@map_db:5432/${POSTGRES_DB}
    depends_on:
      - redis_cache
      - emqx
      - map_db
